<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<title>Login - Nevon Music</title>
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;

}
.container{
background:#1e293b;
padding:30px;

}

}
h2{

margin-bottom:20px;

</head>
<body>

<div class="container">
<h2>Entrar</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Palavra-passe">

<button>Entrar</button>

<p style="text-align:center;margin-top:15px;">
Não tem conta?
<a href="register.html" style="color:#22c55e;">Registar</a>
</p>

</html>
